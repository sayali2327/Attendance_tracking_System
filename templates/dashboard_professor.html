{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h4 class="mb-3">Professor Dashboard</h4>
    </div>
</div>

<div class="row">
    <!-- Stats widgets -->
    <div class="col-md-4 mb-4">
        <div class="card p-4 text-center h-100">
            <h1 class="display-4 text-primary-soft">{{ students_count }}</h1>
            <h5 class="text-muted">Total Students</h5>
            <a href="{{ url_for('students') }}" class="btn btn-outline-dark btn-sm mt-3 mx-auto" style="width: 120px;">Manage</a>
        </div>
    </div>
    
    <div class="col-md-4 mb-4">
        <div class="card p-4 text-center h-100">
            <h1 class="display-4 text-primary-soft">{{ courses_count }}</h1>
            <h5 class="text-muted">Total Courses</h5>
            <a href="{{ url_for('courses') }}" class="btn btn-outline-dark btn-sm mt-3 mx-auto" style="width: 120px;">Manage</a>
        </div>
    </div>
    
    <div class="col-md-4 mb-4">
        <div class="card p-4 text-center h-100">
            <h1 class="display-4 text-primary-soft">{{ lectures_count }}</h1>
            <h5 class="text-muted">Lectures Scheduled</h5>
            <a href="{{ url_for('lectures') }}" class="btn btn-outline-dark btn-sm mt-3 mx-auto" style="width: 120px;">Manage</a>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-12">
        <div class="card p-4 mt-2">
            <h5 class="text-muted pb-2 border-bottom">Quick Actions</h5>
            <div class="d-flex flex-wrap gap-2 mt-3">
                <a href="{{ url_for('mark_attendance') }}" class="btn btn-outline-primary">Mark Attendance</a>
                <a href="{{ url_for('departments') }}" class="btn btn-outline-dark">Manage Departments</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
