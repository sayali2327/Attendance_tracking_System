{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
                <h4 class="mb-0">My Profile</h4>
                <a href="{{ url_for('edit_student_profile') }}" class="btn btn-outline-primary btn-sm">Edit Profile</a>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="text-muted small d-block">Full Name</label>
                    <span class="fs-5 text-secondary">{{ student.name }}</span>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="text-muted small d-block">Email Address</label>
                    <span class="fs-5 text-secondary">{{ student.email }}</span>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="text-muted small d-block">Contact Number</label>
                    <span class="fs-5 text-secondary">{{ student.contact_no or 'N/A' }}</span>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="text-muted small d-block">Department</label>
                    <span class="fs-5 text-secondary">{{ student.dept_name or 'Not Assigned' }}</span>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="text-muted small d-block">Division</label>
                    <span class="fs-5 text-secondary">{{ student.division or 'N/A' }}</span>
                </div>
                <div class="col-12 mb-3">
                    <label class="text-muted small d-block">Address</label>
                    <span class="fs-5 text-secondary">{{ student.address or 'N/A' }}</span>
                </div>
            </div>
            
            <div class="mt-4">
                <a href="{{ url_for('student_dashboard') }}" class="btn btn-light">Back to Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
